# Regenerate dependabot.yml (includes new web_* automatically) and commit if changed.
name: Update Dependabot config

on:
  push:
    paths:
      - 'web_*/**'
      - 'scripts/update-dependabot-config.sh'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Regenerate dependabot.yml
        run: ./scripts/update-dependabot-config.sh

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/dependabot.yml
          git diff --staged --quiet || (git commit -m "chore: regenerate dependabot.yml" && git push)
