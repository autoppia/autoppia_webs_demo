name: SonarCloud Analysis

on:
  push:
    branches:
      - main
      - develop
      - fix/**
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # Required for PR comments
      issues: write  # Required for issue comments

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better analysis

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('webs_server/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r webs_server/requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run tests with coverage
        working-directory: webs_server
        run: |
          pytest tests/ --cov=src --cov-report=xml --cov-report=term
        continue-on-error: true  # Continue even if tests fail

      - name: OWASP Dependency-Check (SARIF for SonarCloud)
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "autoppia_webs_demo"
          path: "webs_server"
          format: "SARIF"
          out: "reports"
        continue-on-error: true  # Do not fail job if dependency-check fails (e.g. network)

      - name: Normalize SARIF report for SonarCloud
        run: |
          mkdir -p reports
          for f in reports/*.sarif; do
            [ -e "$f" ] && cp "$f" reports/dependency-check-report.sarif && break
          done
          ls -la reports/

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.branch.name=${{ github.ref_name }}
            -Dsonar.sarifReportPaths=reports/dependency-check-report.sarif