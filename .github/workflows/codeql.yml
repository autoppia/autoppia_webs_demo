# CodeQL security and quality analysis.
# - JavaScript/TypeScript (web_* apps)
# - Python (webs_server) with config that excludes py/path-injection (see .github/codeql/codeql-config.yml)
# Disable default Code scanning in repo Settings if you see: "advanced configurations cannot be processed when the default setup is enabled".
name: CodeQL

# Silenced: run only manually. Re-enable by uncommenting push/pull_request/schedule below.
on:
  workflow_dispatch:
  # push:
  #   branches: [main, develop]
  # pull_request:
  #   branches: [main, develop]
  # schedule:
  #   - cron: '0 0 * * 1'

permissions:
  security-events: write
  actions: read
  contents: read

jobs:
  analyze-js:
    name: Analyze JavaScript/TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:javascript-typescript'

  analyze-python:
    name: Analyze Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:python'
