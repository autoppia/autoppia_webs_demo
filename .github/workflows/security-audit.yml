# Audit Python dependencies in webs_server for known vulnerabilities.
name: Security audit (Python)

on:
  push:
    branches: [main, develop]
    paths: ['webs_server/**']
  pull_request:
    branches: [main, develop]
    paths: ['webs_server/**']
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  pip-audit:
    name: pip audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: webs_server
        run: python -m pip install -r requirements.txt

      - name: Run pip audit
        working-directory: webs_server
        run: python -m pip audit
