# Web verification pipeline (demo-webs).
# 1) This workflow: lint + unit tests + e2e for web demos (run on push/PR).
# 2) IWA repo has a separate pipeline for task & test generation (see web_16_autodiscord/iwa-module/).
name: Verify demo webs

on:
  push:
    branches: [main, master, feat/discord-clone, feat/autodiscord-module]
    paths:
      - "web_16_autodiscord/**"
      - ".github/workflows/verify-web-demos.yml"
      - "scripts/verify_web.sh"
  pull_request:
    branches: [main, master, feat/discord-clone, feat/autodiscord-module]
    paths:
      - "web_16_autodiscord/**"
      - ".github/workflows/verify-web-demos.yml"
      - "scripts/verify_web.sh"

jobs:
  verify-web-16-autodiscord:
    name: web_16_autodiscord
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web_16_autodiscord/package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Verify (lint + unit + e2e)
        run: |
          chmod +x scripts/verify_web.sh
          ./scripts/verify_web.sh web_16_autodiscord --e2e
        env:
          CI: true
