# SonarCloud project configuration
sonar.projectKey=autoppia_autoppia_webs_demo
sonar.organization=autoppia

# Project metadata
sonar.projectName=Autoppia Webs Demo
sonar.projectVersion=1.0

# Source code: all web app frontends + backend (Python)
sonar.sources=web_1_autocinema/src,web_2_autobooks/src,web_3_autozone/src,web_4_autodining/src,web_5_autocrm/src,web_6_automail/src,web_7_autodelivery/src,web_8_autolodge/src,web_9_autoconnect/src,web_10_autowork/src,web_11_autocalendar/src,web_12_autolist/src,web_13_autodrive/src,web_14_autohealth/src,web_15_autostats/src,webs_server/src,webs_server/scripts

# Exclusions (JS/TS + Python)
sonar.exclusions=\
**/node_modules/**,\
**/.next/**,\
**/dist/**,\
**/build/**,\
**/*.config.js,\
**/*.config.ts,\
**/public/**,\
**/*.d.ts,\
**/data/**,\
**/*mock*.ts,\
**/*mock*.tsx,\
**/*.utils.ts,\
**/tests/**,\
**/__pycache__/**,\
**/*.pyc,\
**/venv/**,\
**/.venv/**,\
**/env/**,\

# TypeScript/JavaScript settings (optional coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# Test exclusions
sonar.test.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/tests/**

# Coverage exclusions
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/node_modules/**,**/.next/**,**/dist/**,**/public/**,**/tests/**
