# SonarCloud Project Configuration
sonar.projectKey=autoppia_autoppia_webs_demo
sonar.organization=autoppia

# Project metadata
sonar.projectName=autoppia_webs_demo
sonar.projectVersion=0.0.1

# Source code paths (Python in webs_server)
sonar.sources=webs_server/src,webs_server/scripts

# Test paths
sonar.tests=webs_server/tests

# Exclusions
# Python bytecode and cache
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/*.pyo,**/*.pyd,**/.pytest_cache/**,**/*.egg-info/**

# Node and third-party (web_* demos use Node)
sonar.exclusions+=**/node_modules/**

# Documentation and non-code files
sonar.exclusions+=**/docs/**,**/*.md,**/*.txt,**/*.json,**/*.jsonl,**/*.log,**/*.gif,**/*.webm,**/*.png,**/*.jpg,**/*.jpeg

# Virtual environments
sonar.exclusions+=**/.venv/**,**/venv/**,**/env/**,**/.env**

# IDE and build artifacts
sonar.exclusions+=**/.idea/**,**/build/**,**/.vscode/**,**/.scannerwork/**

# Test coverage exclusions
sonar.coverage.exclusions=**/webs_server/tests/**,**/test_*.py,**/conftest.py,**/__init__.py

# Coverage report path (generated by pytest-cov from webs_server/)
sonar.python.coverage.reportPaths=webs_server/coverage.xml

# Python-specific settings
sonar.python.version=3.11

# Encoding
sonar.sourceEncoding=UTF-8

# SARIF: only passed via workflow when reports/dependency-check-report.sarif exists (see sonarcloud.yml)

# Security hotspot S5332 (clear-text HTTP): HTTP is required for localhost/Docker internal URLs,
# health checks, and CORS allowlists (e.g. http://localhost:*, http://app:8090). Not used for user-facing traffic.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S5332
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.py
