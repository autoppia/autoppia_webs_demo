# IWA module config for web_16_autodiscord (AutoDiscord).
# Use this in the IWA repo to register the website and drive task & test generation.
# Copy this directory (or its contents) into IWA where demo-web modules are defined.

id: web_16_autodiscord
name: AutoDiscord
description: Discord-like demo — servers, channels, DMs, messages, reactions, settings.

# Where the app is served (dev vs Docker may differ; IWA may override)
base_url: http://localhost:8016
# Docker / production port used by setup.sh
port: 8015

# Paths relative to demo-webs repo (or IWA's copy)
use_cases_doc: web_16_autodiscord/USE_CASES.md
events_doc: web_16_autodiscord/EVENTS.md
use_cases_json: web_16_autodiscord/iwa-module/use_cases.json

# Commands (run from repo root or web dir, depending on IWA setup)
e2e_command: "cd web_16_autodiscord && npm run test:e2e"
event_coverage_command: "cd web_16_autodiscord && node tests/test-events.js"

# Event types this app emits (for task/test generation)
event_types:
  - VIEW_SERVERS
  - VIEW_DMS
  - SELECT_SERVER
  - SELECT_CHANNEL
  - SEND_MESSAGE
  - ADD_REACTION
  - SELECT_DM
  - SEND_DM_MESSAGE
  - OPEN_SETTINGS
  - SETTINGS_APPEARANCE
  - SETTINGS_NOTIFICATIONS
  - SETTINGS_ACCOUNT
  - CREATE_SERVER
  - OPEN_SERVER_SETTINGS
  - DELETE_SERVER
