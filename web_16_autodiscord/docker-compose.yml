services:
  web:
    build:
      context: ..
      dockerfile: web_16_autodiscord/Dockerfile
      args:
        API_URL: ${API_URL:-http://app:8090}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8090}
        GIT_COMMIT_HASH: ${GIT_COMMIT_HASH:-unknown}
    ports:
      - "127.0.0.1:${WEB_PORT}:8015"
    restart: always
    environment:
      - API_URL=${API_URL:-http://app:8090}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8090}
      - PORT=8015
      - NODE_ENV=production
    networks:
      - apps_net

networks:
  apps_net:
    external: true
